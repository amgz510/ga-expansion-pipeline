name: Daily HubSpot Refresh

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC = 5 AM ET / 2 AM PT
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh HubSpot data
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python3 scripts/refresh_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: daily HubSpot refresh $(date -u '+%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Ping healthchecks.io
        run: curl -fsS --retry 3 ${{ secrets.HEALTHCHECKS_PING_URL }}
